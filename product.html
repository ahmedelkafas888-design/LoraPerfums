<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragrance Details | LORA PARFUMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">LORA PARFUMS</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html?category=all">Collection</a>
                <a href="admin.html">Admin</a>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon-wrapper">
                    🛒 <span id="cart-badge" class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <section class="container single-product-container">
        <div id="product-details-wrapper" class="product-detail-layout">
            </div>
    </section>

    <footer>
        <p>&copy; 2026 LORA PARFUMS. All Rights Reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            updateCartBadge();

            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const products = getProducts();
            const product = products.find(p => p.id === productId);
            const wrapper = document.getElementById('product-details-wrapper');

            if (!product) {
                wrapper.innerHTML = `<h2>Fragrance not found. <a href="products.html">Return to collection</a></h2>`;
                return;
            }

            document.title = `${product.name} | LORA PARFUMS`;

            wrapper.innerHTML = `
                <div class="detail-image">
                    <img src="${product.image}" alt="${product.name}">
                </div>
                <div class="detail-info">
                    <span class="detail-category">${product.category.toUpperCase()} COLLECTION</span>
                    <h1 class="detail-title">${product.name}</h1>
                    <div class="detail-price">$${parseFloat(product.price).toFixed(2)}</div>
                    <p class="detail-description">${product.description}</p>
                    
                    <div class="purchase-actions">
                        <div class="qty-selector">
                            <button onclick="adjustDetailQty(-1)">-</button>
                            <input type="number" id="detail-qty" value="1" min="1" readonly>
                            <button onclick="adjustDetailQty(1)">+</button>
                        </div>
                        <button class="btn" onclick="handleAddToCart('${product.id}')">Add To Cart</button>
                    </div>
                </div>
            `;
        });

        function adjustDetailQty(amount) {
            const qtyInput = document.getElementById('detail-qty');
            let val = parseInt(qtyInput.value) + amount;
            if(val < 1) val = 1;
            qtyInput.value = val;
        }

        function handleAddToCart(id) {
            const qty = parseInt(document.getElementById('detail-qty').value);
            addToCart(id, qty);
            alert('Added gracefully to your vanity case.');
        }
    </script>
</body>
</html>
