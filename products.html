<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Collection | LORA PARFUMS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">LORA PARFUMS</a>
            <nav>
                <a href="index.html">Home</a>
                <a href="products.html?category=all" id="nav-all">Collection</a>
                <a href="products.html?category=Women" id="nav-women">Women</a>
                <a href="products.html?category=Men" id="nav-men">Men</a>
                <a href="admin.html">Admin</a>
            </nav>
            <div class="nav-icons">
                <a href="cart.html" class="cart-icon-wrapper">
                    🛒 <span id="cart-badge" class="cart-badge">0</span>
                </a>
            </div>
        </div>
    </header>

    <section class="page-title">
        <h1 id="catalog-title">The Master Collection</h1>
        <p>Immerse yourself in olfactory perfection</p>
    </section>

    <section class="container">
        <div id="catalog-grid" class="products-grid">
            </div>
    </section>

    <footer>
        <p>&copy; 2026 LORA PARFUMS. All Rights Reserved.</p>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            updateCartBadge();
            
            const urlParams = new URLSearchParams(window.location.search);
            const categoryFilter = urlParams.get('category') || 'all';
            
            // Adjust active nav links dynamically
            if(categoryFilter === 'Women') document.getElementById('nav-women').classList.add('active');
            else if(categoryFilter === 'Men') document.getElementById('nav-men').classList.add('active');
            else document.getElementById('nav-all').classList.add('active');

            if(categoryFilter !== 'all') {
                document.getElementById('catalog-title').innerText = `Pour ${categoryFilter}`;
            }

            const products = getProducts();
            const catalogGrid = document.getElementById('catalog-grid');
            
            const filteredProducts = categoryFilter === 'all' 
                ? products 
                : products.filter(p => p.category.toLowerCase() === categoryFilter.toLowerCase());

            if(filteredProducts.length === 0) {
                catalogGrid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; padding: 3rem; font-style: italic;">No fragrances found in this collection.</p>`;
            } else {
                filteredProducts.forEach(product => {
                    catalogGrid.innerHTML += createProductCard(product);
                });
            }
        });
    </script>
</body>
</html>
