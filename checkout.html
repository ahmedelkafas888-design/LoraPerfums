<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Processing Checkout | LORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased text-neutral-900 bg-white">

    <header class="fixed top-0 left-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-neutral-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
            <button id="globalLangToggle" class="text-xs tracking-widest font-bold text-amber-600 hover:text-black transition">English</button>
            <a href="index.html" class="absolute left-1/2 -translate-x-1/2 text-2xl sm:text-3xl tracking-[0.3em] font-light text-neutral-900">LORA</a>
            <div class="flex items-center gap-4">
                <a href="cart.html" class="text-xs tracking-widest uppercase text-neutral-500 hover:text-black transition" data-i18n="navBackToCart">العودة للحقيبة</a>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-24 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <form id="checkoutProcessingFormStructure" class="lg:col-span-7 bg-neutral-50 border border-neutral-200/60 p-6 sm:p-8 space-y-6 text-xs font-sans">
                <h2 class="text-xl font-serif font-light text-neutral-900 tracking-wider mb-6 uppercase border-b border-neutral-200 pb-3" data-i18n="shippingInfo">بيانات الشحن والتوصيل</h2>
                
                <div class="space-y-4">
                    <div>
                        <label class="block uppercase tracking-wider text-neutral-500 mb-1.5 font-medium" data-i18n="fullName">الاسم الكامل</label>
                        <input type="text" id="chkFullName" required class="lux-input font-serif rounded-none">
                    </div>
                    <div>
                        <label class="block uppercase tracking-wider text-neutral-500 mb-1.5 font-medium" data-i18n="phoneNumber">رقم الهاتف</label>
                        <input type="tel" id="chkPhoneNumber" required class="lux-input rounded-none font-mono">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block uppercase tracking-wider text-neutral-500 mb-1.5 font-medium" data-i18n="cityName">المدينة</label>
                            <input type="text" id="chkCity" required class="lux-input rounded-none">
                        </div>
                        <div>
                            <label class="block uppercase tracking-wider text-neutral-500 mb-1.5 font-medium" data-i18n="fullAddress">العنوان بالتفصيل</label>
                            <input type="text" id="chkAddress" required class="lux-input rounded-none">
                        </div>
                    </div>
                    <div>
                        <label class="block uppercase tracking-wider text-neutral-500 mb-1.5 font-medium" data-i18n="orderNotes">ملاحظات إضافية (اختياري)</label>
                        <textarea id="chkNotes" rows="3" class="lux-input rounded-none"></textarea>
                    </div>
                </div>

                <div class="pt-4 border-t border-neutral-200">
                    <button type="submit" class="lux-btn w-full py-4 text-xs tracking-widest font-medium" data-i18n="executeCheckout">تأكيد الطلب والدفع عند الاستلام</button>
                </div>
            </form>

            <div class="lg:col-span-5 bg-white border border-neutral-200 p-6 sm:p-8 space-y-6">
                <h3 class="text-xs tracking-widest uppercase text-neutral-800 font-bold border-b border-neutral-200 pb-3" data-i18n="orderSummary">ملخص الطلب</h3>
                <div id="checkoutItemsBreakdownList" class="space-y-3 max-h-48 overflow-y-auto pr-2"></div>
                
                <div class="pt-4 border-t border-neutral-100 space-y-3 font-sans text-xs">
                    <div class="flex justify-between text-neutral-500">
                        <span data-i18n="subtotal">المجموع الفرعي</span>
                        <span id="chkSubtotalPriceDisplay" class="font-mono">0 EGP</span>
                    </div>
                    <div id="couponDiscountLineRow" class="hidden flex justify-between text-red-600 font-medium">
                        <span>قيمة الخصم</span>
                        <span id="chkCouponDiscountValueDisplay" class="font-mono">-0 EGP</span>
                    </div>
                    <div class="flex justify-between text-neutral-900 text-lg font-bold font-mono pt-2 border-t border-neutral-100">
                        <span class="font-serif font-light text-sm uppercase tracking-wider text-neutral-500" data-i18n="totalVal">الإجمالي التكلفة</span>
                        <span id="chkGrandTotalPriceDisplay">0 EGP</span>
                    </div>
                </div>

                <div class="pt-4 border-t border-neutral-100 space-y-2 font-sans text-xs">
                    <label class="block uppercase tracking-wider text-neutral-400 font-medium" data-i18n="couponCode">لديك كود خصم؟</label>
                    <div class="flex gap-2">
                        <input type="text" id="couponCodeInputField" class="lux-input uppercase rounded-none tracking-widest font-mono py-2" placeholder="CODE">
                        <button type="button" id="applyCouponActionTriggerBtn" class="bg-neutral-900 text-white px-4 text-xs tracking-widest uppercase hover:bg-neutral-800 transition">تطبيق</button>
                    </div>
                    <p id="couponValidationFeedbackMessage" class="text-[11px] font-medium hidden"></p>
                </div>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainerStack"></div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
