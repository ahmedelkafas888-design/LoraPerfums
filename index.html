<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LORA | Haute Parfumerie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased text-neutral-900 bg-white">

    <header class="fixed top-0 left-0 w-full z-50 bg-white/95 backdrop-blur-md border-b border-neutral-100 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between relative">
            <div class="flex items-center">
                <button id="globalLangToggle" class="text-xs tracking-widest font-bold text-amber-600 hover:text-black transition">العربية</button>
            </div>
            
            <a href="index.html" class="absolute left-1/2 -translate-x-1/2 text-2xl sm:text-3xl tracking-[0.3em] font-light text-neutral-900 hover:text-amber-600 transition">LORA</a>
            
            <nav class="hidden md:flex items-center gap-8 ml-auto mr-12">
                <a href="index.html" class="text-xs tracking-widest uppercase hover:text-amber-600 transition text-neutral-900 font-medium" data-i18n="navHome">Home</a>
                <a href="products.html" class="text-xs tracking-widest uppercase hover:text-amber-600 transition text-neutral-500" data-i18n="navProducts">Fragrances</a>
                <a href="wishlist.html" class="text-xs tracking-widest uppercase hover:text-amber-600 transition text-neutral-500" data-i18n="navWishlist">Wishlist</a>
                <a href="admin.html" class="text-xs tracking-widest uppercase hover:text-amber-600 transition text-neutral-500" data-i18n="navAdmin">Atelier Vault</a>
            </nav>

            <div class="flex items-center gap-4 sm:gap-6 z-10">
                <a href="wishlist.html" class="relative text-neutral-800 hover:text-amber-600 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
                    <span id="wishlistBadgeCount" class="absolute -top-2 -right-2 bg-amber-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-sans">0</span>
                </a>
                <a href="cart.html" id="globalCartAnchor" class="relative text-neutral-800 hover:text-amber-600 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span id="cartBadgeCount" class="absolute -top-2 -right-2 bg-neutral-900 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-sans">0</span>
                </a>
                <button id="mobileNavTrigger" class="md:hidden flex flex-col gap-[4px] justify-center items-center w-6 h-6">
                    <span class="hamburger-line line1"></span>
                    <span class="hamburger-line line2"></span>
                    <span class="hamburger-line line3"></span>
                </button>
            </div>
        </div>
        
        <div id="mobileExpandedNavPane" class="hidden md:hidden border-t border-neutral-100 bg-white px-4 py-6 space-y-4 shadow-xl">
            <a href="index.html" class="block text-xs tracking-widest uppercase text-neutral-900 py-2" data-i18n="navHome">Home</a>
            <a href="products.html" class="block text-xs tracking-widest uppercase text-neutral-500 py-2" data-i18n="navProducts">Fragrances</a>
            <a href="wishlist.html" class="block text-xs tracking-widest uppercase text-neutral-500 py-2" data-i18n="navWishlist">Wishlist</a>
            <a href="admin.html" class="block text-xs tracking-widest uppercase text-neutral-500 py-2" data-i18n="navAdmin">Atelier Vault</a>
        </div>
    </header>

    <main class="pt-20">
        <section class="relative h-[85vh] sm:h-screen bg-neutral-950 flex items-center justify-center text-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img src="https://images.unsplash.com/photo-1547887537-6158d64c35b3?auto=format&fit=crop&w=2000&q=80" class="w-full h-full object-cover opacity-40 mix-blend-luminosity transform scale-105">
            </div>
            <div class="absolute inset-0 hero-gradient z-10"></div>
            
            <div class="relative z-20 px-4 max-w-4xl mx-auto space-y-6">
                <h1 class="text-5xl sm:text-7xl lg:text-8xl tracking-[0.3em] font-light text-white uppercase">LORA</h1>
                <div id="dynamicPromoBannerTarget" class="hidden inline-block bg-amber-500/10 border border-amber-500/30 px-6 py-2 backdrop-blur-sm">
                    <p id="promoBannerText" class="text-xs sm:text-sm tracking-widest text-amber-400 font-medium uppercase font-sans"></p>
                </div>
                <p class="text-xs sm:text-sm tracking-[0.4em] text-neutral-300 uppercase max-w-md mx-auto block pt-2" data-i18n="promoText">Exclusive Discounts & Special Offers</p>
                <div class="pt-6">
                    <a href="products.html" class="lux-btn-gold text-xs px-8 py-3.5 tracking-widest font-medium" data-i18n="navProducts">Explore Collections</a>
                </div>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-0 border-b border-neutral-100">
            <div class="relative group h-[50vh] sm:h-[65vh] overflow-hidden bg-neutral-900 flex items-center justify-center text-center">
                <img src="https://images.unsplash.com/photo-1523293182086-7651a899d37f?auto=format&fit=crop&w=1200&q=80" class="absolute inset-0 w-full h-full object-cover opacity-50 transition-transform duration-1000 ease-out group-hover:scale-105 mix-blend-luminosity">
                <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition-colors duration-500"></div>
                <div class="relative z-10 p-6 space-y-3">
                    <h2 class="text-2xl sm:text-3xl tracking-[0.25em] font-light text-white uppercase" data-i18n="mensTitle">MEN'S COLLECTION</h2>
                    <a href="products.html?cat=men" class="inline-block text-xs text-amber-400 tracking-widest uppercase border-b border-amber-400/50 pb-1 hover:text-white hover:border-white transition-all duration-300">Discover Profile</a>
                </div>
            </div>

            <div class="relative group h-[50vh] sm:h-[65vh] overflow-hidden bg-neutral-900 flex items-center justify-center text-center">
                <img src="https://images.unsplash.com/photo-1594035910387-fea47794261f?auto=format&fit=crop&w=1200&q=80" class="absolute inset-0 w-full h-full object-cover opacity-50 transition-transform duration-1000 ease-out group-hover:scale-105 mix-blend-luminosity">
                <div class="absolute inset-0 bg-black/20 group-hover:bg-black/40 transition-colors duration-500"></div>
                <div class="relative z-10 p-6 space-y-3">
                    <h2 class="text-2xl sm:text-3xl tracking-[0.25em] font-light text-white uppercase" data-i18n="womensTitle">WOMEN'S COLLECTION</h2>
                    <a href="products.html?cat=women" class="inline-block text-xs text-amber-400 tracking-widest uppercase border-b border-amber-400/50 pb-1 hover:text-white hover:border-white transition-all duration-300">Discover Profile</a>
                </div>
            </div>
        </section>

        <section class="py-20 sm:py-28 bg-neutral-50">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center max-w-xl mx-auto mb-16 space-y-2">
                    <h3 class="text-2xl sm:text-3xl tracking-widest uppercase font-light text-neutral-900">Curated Masterpieces</h3>
                    <div class="w-12 h-[1px] bg-amber-500 mx-auto"></div>
                </div>
                
                <div id="curatedShowcaseGridTarget" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-8"></div>
            </div>
        </section>
    </main>

    <footer class="bg-neutral-950 border-t border-neutral-900 text-neutral-500 py-12 text-center text-[10px] tracking-[0.3em] uppercase px-4">
        <p class="max-w-md mx-auto leading-loose">&copy; 2026 LORA Haute Parfumerie. All Rights Reserved.</p>
    </footer>

    <div class="toast-container" id="toastContainerStack"></div>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="script.js"></script>
    <script type="module" src="products.js"></script>
</body>
</html>
