<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atelier Vault Ledger | LORA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased bg-neutral-950 text-neutral-200 font-serif">

    <div id="adminAuthAccessGateModalWindow" class="fixed inset-0 bg-neutral-950 z-[10000] flex items-center justify-center p-4">
        <div class="max-w-md w-full bg-neutral-900 border border-neutral-800 p-6 sm:p-8 space-y-6 text-center">
            <h2 class="text-2xl tracking-[0.3em] font-light text-white">LORA VAULT</h2>
            <div class="space-y-2">
                <input type="password" id="adminSecurityAccessKeyField" class="w-full bg-neutral-950 border border-neutral-800 text-center text-white py-3 px-4 text-xs tracking-widest focus:outline-none focus:border-amber-500 font-mono" placeholder="SECURITY KEY TOKEN">
            </div>
            <button id="adminSubmitAuthAccessGateBtn" class="lux-btn-gold w-full py-3 text-xs tracking-widest font-medium">AUTHENTICATE ACCESS</button>
        </div>
    </div>

    <header class="fixed top-0 left-0 w-full z-50 bg-neutral-900/95 backdrop-blur-md border-b border-neutral-800 h-20 flex items-center justify-between px-4 sm:px-6 lg:px-8">
        <button id="adminLangToggleBtn" class="text-xs tracking-widest font-bold text-amber-500 uppercase">Toggle Lang</button>
        <a href="index.html" class="text-2xl tracking-[0.3em] font-light text-white">LORA</a>
        <div class="flex items-center gap-2">
            <button id="tabBtn-products" class="tab-btn-active text-[10px] tracking-widest uppercase px-3 py-2 border border-neutral-800 hover:border-amber-500 text-white font-sans transition">Products</button>
            <button id="tabBtn-orders" class="text-[10px] tracking-widest uppercase px-3 py-2 border border-neutral-800 hover:border-amber-500 text-white font-sans transition relative">Orders <span id="adminPendingOrdersBadgeCounter" class="hidden absolute -top-1.5 -right-1.5 bg-amber-500 text-neutral-950 text-[9px] font-bold font-mono px-1.5 py-0.5 rounded-full">0</span></button>
            <button id="tabBtn-coupons" class="text-[10px] tracking-widest uppercase px-3 py-2 border border-neutral-800 hover:border-amber-500 text-white font-sans transition">Coupons</button>
            <button id="tabBtn-settings" class="text-[10px] tracking-widest uppercase px-3 py-2 border border-neutral-800 hover:border-amber-500 text-white font-sans transition">Settings</button>
        </div>
    </header>

    <main class="pt-28 pb-24 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 font-sans text-xs">
        
        <section id="adminTabSection-products" class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <form id="adminProductFormElement" class="lg:col-span-5 bg-neutral-900 border border-neutral-800 p-6 space-y-4">
                <input type="hidden" id="editProductHiddenIdField">
                <h3 class="text-sm uppercase tracking-widest text-white border-b border-neutral-800 pb-2">Manage Fragrance Blueprint</h3>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-neutral-400 mb-1">Name (EN)</label>
                        <input type="text" id="pNameEn" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500">
                    </div>
                    <div>
                        <label class="block text-neutral-400 mb-1">Name (AR)</label>
                        <input type="text" id="pNameAr" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 text-right">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-neutral-400 mb-1">Category</label>
                        <select id="pCategory" class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500">
                            <option value="men">Men</option>
                            <option value="women">Women</option>
                            <option value="unisex">Unisex</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-neutral-400 mb-1">Size (ml)</label>
                        <input type="text" id="pSize" placeholder="100" class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 font-mono">
                    </div>
                    <div>
                        <label class="block text-neutral-400 mb-1">Stock</label>
                        <input type="number" id="pStock" placeholder="10" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 font-mono">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-neutral-400 mb-1">Base Price (EGP)</label>
                        <input type="text" id="pPrice" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 font-mono">
                    </div>
                    <div>
                        <label class="block text-neutral-400 mb-1">Discount Price (Optional)</label>
                        <input type="text" id="pDiscountPrice" class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 font-mono">
                    </div>
                </div>

                <div>
                    <label class="block text-neutral-400 mb-1">Product Media Asset</label>
                    <input type="file" id="pProductImageFileInput" accept="image/*" class="w-full text-neutral-400 text-xs">
                    <input type="hidden" id="pUploadedImageSecureURLString">
                    <p id="imageUploadProgressTrackerFeedback" class="text-[11px] text-amber-500 mt-1 font-mono hidden"></p>
                </div>

                <div>
                    <label class="block text-neutral-400 mb-1">Description (EN)</label>
                    <textarea id="pDescEn" rows="2" class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500"></textarea>
                </div>
                <div>
                    <label class="block text-neutral-400 mb-1">Description (AR)</label>
                    <textarea id="pDescAr" rows="2" class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 text-right"></textarea>
                </div>

                <button type="submit" class="lux-btn-gold w-full py-3 mt-2 uppercase font-medium tracking-widest text-xs">Commit Registry Changes</button>
            </form>

            <div class="lg:col-span-7 space-y-3">
                <h3 class="text-sm uppercase tracking-widest text-white">Live Datastore Catalog Indices</h3>
                <div id="adminLiveCatalogLedgerInjectedWrapper" class="space-y-2 max-h-[70vh] overflow-y-auto pr-2"></div>
            </div>
        </section>

        <section id="adminTabSection-orders" class="hidden space-y-6">
            <div class="flex items-center justify-between border-b border-neutral-800 pb-3">
                <h3 class="text-sm uppercase tracking-widest text-white">Live Orders Fulfillment Dashboard</h3>
                <div class="text-neutral-400 font-mono text-[11px]">
                    Pending Verification Count: <span id="adminPendingOrdersDashboardStatusBadge" class="text-amber-500 font-bold">0</span>
                </div>
            </div>
            <div id="adminLiveOrdersInjectedWrapper" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="adminTabSection-coupons" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            <form id="adminCouponCreationFormElement" class="lg:col-span-5 bg-neutral-900 border border-neutral-800 p-6 space-y-4">
                <h3 class="text-sm uppercase tracking-widest text-white border-b border-neutral-800 pb-2">Generate Promotion Coupons</h3>
                <div>
                    <label class="block text-neutral-400 mb-1">Coupon Mask Phrase Code</label>
                    <input type="text" id="cCode" placeholder="LORA10" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white uppercase focus:outline-none focus:border-amber-500 font-mono tracking-widest">
                </div>
                <div>
                    <label class="block text-neutral-400 mb-1">Reduction Ratio Matrix Percentage (%)</label>
                    <input type="number" id="cPercentage" placeholder="10" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500 font-mono">
                </div>
                <div>
                    <label class="block text-neutral-400 mb-1">Initial Active Execution State</label>
                    <select id="cEnabled" class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white focus:outline-none focus:border-amber-500">
                        <option value="true">Active Operational Status</option>
                        <option value="false">Suspended Conditional Status</option>
                    </select>
                </div>
                <button type="submit" class="lux-btn-gold w-full py-3 uppercase font-medium tracking-widest text-xs">Deploy Promotion Parameter</button>
            </form>

            <div class="lg:col-span-7 space-y-3">
                <h3 class="text-sm uppercase tracking-widest text-white">Active Global Promotion Nodes</h3>
                <div id="adminLiveCouponsLedgerInjectedWrapper" class="space-y-2"></div>
            </div>
        </section>

        <section id="adminTabSection-settings" class="hidden max-w-md mx-auto">
            <form id="adminGlobalSettingsFormElement" class="bg-neutral-900 border border-neutral-800 p-6 space-y-4">
                <h3 class="text-sm uppercase tracking-widest text-white border-b border-neutral-800 pb-2">Ecosystem Configuration Parameters</h3>
                <div>
                    <label class="block text-neutral-400 mb-1">Master Order WhatsApp Line Node</label>
                    <input type="text" id="cfgWhatsAppLine" required class="w-full bg-neutral-950 border border-neutral-800 p-2.5 text-white font-mono focus:outline-none focus:border-amber-500">
                </div>
                <button type="submit" class="lux-btn-gold w-full py-3 uppercase font-medium tracking-widest text-xs">Sync System Configurations</button>
            </form>
        </section>
    </main>

    <script type="module" src="firebase.js"></script>
    <script type="module" src="admin.js"></script>
</body>
</html>
